webdriver {
  driver = chrome
  autodownload = false
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless=new", "--no-sandbox", "--disable-dev-shm-usage", "--window-size=1920,1080", "--disable-gpu", "--remote-allow-origins=*"]
    }
  }
}

headless.mode = true

serenity {
  project.name = "AUTO_FRONT_SCREENPLAY"
  report.encoding = "UTF-8"
  take.screenshots = FOR_FAILURES
}

environments {
  default {
    webdriver.base.url = "http://localhost:3001"
  }
}
